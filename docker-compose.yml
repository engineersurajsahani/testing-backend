version: '3.8'

services:
  backend:
    build: .
    container_name: testing-backend
    ports:
      - "4000:4000"
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge